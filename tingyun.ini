# ---------------------------------------------------------------------------

#
# This file configures the Ting Yun Python Agent.
#
# The path to the configuration file should be supplied to the function
# tingyun-admin generate-config  LicenseKey tingyun.ini
# when the agent is being initialized.
#
# The configuration file follows a structure similar to what you would
# find for Microsoft Windows INI files. For further information on the
# configuration file format see the Python configparser documentation at:
#
#    https://docs.python.org/library/configparser.html
#
# For further discussion on the behaviour of the Python agent that can
# be configured via this configuration file see:
#
#    https://wukongdoc.tingyun.com/apm/deploy/Python/deploy.html
#

# ---------------------------------------------------------------------------

# Here are the settings that are common to all environments.

[tingyun]

# The license key to the server. You must specify the license key associated with your tingyun account.
# This key binds the Python Agent's data to your account in the tingyun service.
# eg: license_key = 123-456-789
license_key = 5cw9OeY2EHxkmvYY

# The global switch about the agent.
# default is True, support True, False, on, off case insensitive
enabled = True

# The application name.
# Set this to be the name of your application as you would like it to show up in Ting Yun UI.
# You may also set this using the TINGYUN_APP_NAME environment variable.
app_name = TingYun-Langfuse-Example

# The addresses of the collector, multiple collectors are separated by commas.
# e.g. collectors = collector:7665,127.0.0.1:7665
collectors = 192.168.1.216:7665

# Sets the name of a file to log agent messages to. Whatever you
# set this to, you must ensure that the permissions for the
# containing directory and the file itself are correct, and
# that the user that your web application runs as can write out
# to the file.
log_file = /Users/wangbo/github/tingyun-langfuse-example/tingyun-agent.log

# Maximum number of log files to retain. Oldest files are deleted when this limit is exceeded
log_file_count = 1

# Maximum size of a single log file in MB. Log rotation occurs when this size is reached
log_file_size = 10

# Sets the level of detail of messages sent to the log file, if
# a log file location has been provided. Possible values, in
# increasing order of detail, are: "critical", "error", "warning",
# "info" and "debug". When reporting any agent issues to Ting
# Yun technical support, the most useful setting for the
# support engineers is "debug". However, this can generate a lot
# of information very quickly, so it is best not to keep the
# agent at this level for longer than it takes to reproduce the
# problem you are experiencing.
log_level = debug

# Set the audit mode for collecting data.
# if True all the upload data to server will be record to log file and level INFO is used to
# default False, support True, False, on, off, case insensitive
# eg: audit_mode = False
audit_mode = True

# Specifies whether to activate SSL.
# default is False, use the HTTP transport protocol,if set True, use the HTTPS transport protocol.
# eg: ssl = False
ssl = False

# Enable automatic transaction naming, the URI name will be used as the action name
# eg: auto_action_naming = True
auto_action_naming = True

# This parameter is used to enable URL auto-merging,
# which takes effect only when automatic transaction naming is disabled
# eg: urls_merge = True
urls_merge = True

# GenAI Provider 与 BaseURL 的映射字典（JSON 格式）
# key: provider 名称，value: base_url（str 或 list[str]，同一 provider 可配多个 base_url）
# 正向查找：已知 provider 查 base_url（精确匹配 key，多个时取第一个）
# 反向查找：已知 base_url 查 provider（URL 前缀匹配，取最长匹配）
# eg: gen_ai.provider_url_mapping = {"openai": "https://my-proxy.example.com", "zhipuai": ["https://open.bigmodel.cn", "https://api.z.ai"]}
; gen_ai.provider_url_mapping = {}
gen_ai.provider_url_mapping = {"openai": "https://api.openai.com", "zhipuai": ["https://open.bigmodel.cn", "https://api.z.ai"], "deepseek": "https://api.deepseek.com", "dashscope": "https://dashscope.aliyuncs.com", "minimax": "https://api.minimaxi.com", "moonshot": "https://api.moonshot.cn", "siliconflow": "https://api.siliconflow.cn", "ollama": "http://localhost:11434", "baichuan": "https://api.baichuan-ai.com"}
