worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # --- Langfuse Demo 反向代理 ---
    upstream langfuse_backend {
        server 127.0.0.1:8002;
        keepalive 32;
    }

    server {
        listen 8080;
        server_name localhost;

        access_log logs/langfuse_demo_access.log main;
        error_log  logs/langfuse_demo_error.log;

        # 请求体大小限制（适配 Embedding 等大文本场景）
        client_max_body_size 10m;

        # --- API 代理 ---
        location /api/ {
            proxy_pass http://langfuse_backend;
            proxy_http_version 1.1;

            # SSE 流式支持：关闭缓冲，实时转发
            proxy_buffering off;
            proxy_cache off;

            # 超时（LLM 推理可能耗时较长）
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # 透传真实客户端信息
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE 必需头部
            proxy_set_header Connection '';
            proxy_set_header Accept-Encoding '';
        }

        # --- 静态资源 ---
        location / {
            proxy_pass http://langfuse_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- 健康检查 ---
        location /health {
            proxy_pass http://langfuse_backend/api/config;
            proxy_http_version 1.1;
            access_log off;
        }
    }
}
